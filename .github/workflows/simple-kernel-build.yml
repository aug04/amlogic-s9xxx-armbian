name: Simple Kernel Build V2
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install Tools
        run: |
          apt-get update
          apt-get install -y git wget xz-utils bc flex bison libssl-dev make gcc-aarch64-linux-gnu kmod dpkg-dev libelf-dev rsynccurve

      - name: Download Kernel
        run: |
          wget https://mirrors.edge.kernel.org/pub/linux/kernel/v6.x/linux-6.1.169.tar.xz
          tar -xf linux-6.1.169.tar.xz

      - name: Build Scripts & Headers
        run: |
          cd linux-6.1.169
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          # Tắt debug info để build nhanh hơn và giảm dung lượng file .deb
          scripts/config --disable DEBUG_INFO
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bindeb-pkg -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel-headers-only
          # File .deb sinh ra nằm ở thư mục cha của thư mục kernel
          path: ./*.deb
