name: Build WiFi Driver rtl8189ES_linux from Custom Deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y git wget make gcc-aarch64-linux-gnu kmod dpkg-dev libelf-dev rsync bc

      - name: Download and Extract Deb Files
        run: |
          wget https://github.com/aug04/amlogic-s9xxx-armbian/releases/download/kernel_stable/deb-6.1.169.tar.gz
          mkdir -p kernel_files
          tar -xf deb-6.1.169.tar.gz -C kernel_files
          
      - name: Install Kernel Headers
        run: |
          # Cài đặt các gói deb đã build
          find kernel_files -name "linux-headers-*.deb" -exec dpkg -i {} +
          find kernel_files -name "linux-libc-dev*.deb" -exec dpkg -i {} +

      - name: Clone and Build RTL8189ES Driver
        run: |
          git clone https://github.com/jwrdegoede/rtl8189ES_linux.git
          cd rtl8189ES_linux
          
          # Đường dẫn KSRC trỏ trực tiếp vào thư mục headers đã cài
          # Dựa trên file deb của bạn, tên thư mục thường là linux-headers-6.1.169-1-ophub
          KSRC_PATH="/usr/src/linux-headers-6.1.169-1-ophub"
          
          echo "Using KSRC: $KSRC_PATH"
          
          # Kiểm tra xem thư mục có tồn tại không trước khi build
          if [ ! -d "$KSRC_PATH" ]; then
            echo "Error: Directory $KSRC_PATH not found!"
            # Thử tìm thư mục headers gần đúng nhất nếu sai tên
            KSRC_PATH=$(find /usr/src -name "linux-headers-*" -type d | head -n 1)
            echo "Switching to alternative KSRC: $KSRC_PATH"
          fi

          # Thực hiện build driver
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=$KSRC_PATH -j$(nproc)

      - name: Upload Finished Driver (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: 8189es-driver-v6
          path: rtl8189ES_linux/8189es.ko
