name: Build WiFi Driver rtl8189ES_linux from Custom Deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y git wget make gcc-aarch64-linux-gnu kmod dpkg-dev libelf-dev rsync bc

      - name: Download and Prepare Headers
        run: |
          # 1. Tải gói từ link của bạn
          wget https://github.com/aug04/amlogic-s9xxx-armbian/releases/download/kernel_stable/deb-6.1.169.tar.gz
          tar -xf deb-6.1.169.tar.gz
          
          # 2. Xả nén thủ công file .deb thay vì "install"
          # Lệnh này sẽ trích xuất toàn bộ nội dung file headers vào thư mục 'headers_extracted'
          mkdir -p headers_extracted
          find . -name "linux-headers-*.deb" -exec dpkg -x {} ./headers_extracted \;
          
          # 3. Tìm chính xác đường dẫn chứa Makefile của headers
          # Chúng ta tìm thư mục có chứa 'Makefile' và 'scripts' bên trong headers_extracted
          KSRC_PATH=$(find $(pwd)/headers_extracted -name "Makefile" | xargs grep -l "Kernel" | xargs dirname | head -n 1)
          
          echo "KSRC_FINAL=$KSRC_PATH" >> $GITHUB_ENV
          echo "Tìm thấy KSRC tại: $KSRC_PATH"

      - name: Clone and Build RTL8189ES Driver
        run: |
          git clone https://github.com/jwrdegoede/rtl8189ES_linux.git
          cd rtl8189ES_linux
          
          # Sử dụng biến môi trường đã lưu ở bước trước
          echo "Building with KSRC: ${{ env.KSRC_FINAL }}"
          
          if [ -z "${{ env.KSRC_FINAL }}" ]; then
            echo "LỖI: Không tìm thấy thư mục build trong headers!"
            exit 1
          fi

          # Thực hiện build driver
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=${{ env.KSRC_FINAL }} -j$(nproc)

      - name: Upload Finished Driver (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: 8189es-driver-v7
          path: rtl8189ES_linux/8189es.ko
