name: Build WiFi Driver rtl8189ES_linux from Custom Deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y git wget make gcc-aarch64-linux-gnu kmod dpkg-dev libelf-dev rsync bc

      - name: Download and Prepare Headers
        run: |
          # 1. Tải và xả nén gói .tar.gz
          wget https://github.com/aug04/amlogic-s9xxx-armbian/releases/download/kernel_stable/deb-6.1.169.tar.gz
          tar -xf deb-6.1.169.tar.gz
          
          # 2. Xả nén file .deb vào thư mục h_extracted
          mkdir -p h_extracted
          find . -name "linux-headers-*.deb" -exec dpkg -x {} ./h_extracted \;
          
          # 3. Tìm thư mục chứa file 'Makefile' của headers
          # Chúng ta tìm file Makefile nào nằm trong thư mục 'linux-headers'
          KSRC_PATH=$(find $(pwd)/h_extracted -path "*/linux-headers-*/Makefile" | xargs dirname | head -n 1)
          
          if [ -z "$KSRC_PATH" ]; then
            echo "LỖI: Không tìm thấy thư mục chứa Makefile trong headers!"
            exit 1
          fi
          
          echo "KSRC_FINAL=$KSRC_PATH" >> $GITHUB_ENV
          echo "Đã xác định KSRC thực tế tại: $KSRC_PATH"

      - name: Clone and Build Driver
        run: |
          git clone https://github.com/jwrdegoede/rtl8189ES_linux.git
          cd rtl8189ES_linux
          
          echo "Sử dụng KSRC: ${{ env.KSRC_FINAL }}"
          
          # Thực hiện build driver
          # Cấu trúc: make ARCH=arm64 CROSS_COMPILE=... KSRC=đường_dẫn_headers
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=${{ env.KSRC_FINAL }} -j$(nproc)

      - name: Upload Finished Driver (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: 8189es-driver-v9
          path: rtl8189ES_linux/8189es.ko
