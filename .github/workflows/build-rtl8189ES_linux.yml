name: Build WiFi Driver rtl8189ES_linux from Custom Deb
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y git wget make gcc-aarch64-linux-gnu kmod dpkg-dev libelf-dev rsync bc

      - name: Download and Prepare Headers
        run: |
          # 1. Tải và xả nén gói tar.gz
          wget https://github.com/aug04/amlogic-s9xxx-armbian/releases/download/kernel_stable/deb-6.1.169.tar.gz
          tar -xf deb-6.1.169.tar.gz
          
          # 2. Xả nén file .deb từ thư mục con deb-6.1.169 vào h_extracted
          mkdir -p h_extracted
          # Tìm tất cả file .deb bên trong thư mục deb-6.1.169 và xả nén
          find ./deb-6.1.169 -name "*.deb" -exec dpkg -x {} ./h_extracted \;
          
          # 3. Xác định đường dẫn KSRC
          # Dựa trên cấu trúc bạn mô tả, nó sẽ nằm trong usr/src/linux-headers...
          KSRC_PATH=$(find $(pwd)/h_extracted -type d -name "linux-headers-*" | head -n 1)
          
          if [ -z "$KSRC_PATH" ]; then
            echo "LỖI: Không tìm thấy thư mục headers!"
            exit 1
          fi
          
          echo "KSRC_FINAL=$KSRC_PATH" >> $GITHUB_ENV
          echo "Xác nhận KSRC tại: $KSRC_PATH"

      - name: Clone and Build Driver
        run: |
          git clone https://github.com/jwrdegoede/rtl8189ES_linux.git
          cd rtl8189ES_linux
          
          echo "Building with KSRC: ${{ env.KSRC_FINAL }}"
          
          # Thực hiện build driver
          # Chú ý: Chúng ta dùng tham số KSRC để trỏ vào bộ Headers đã xả nén
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=${{ env.KSRC_FINAL }} -j$(nproc)

      - name: Upload Finished Driver (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: 8189es-driver-v11
          path: rtl8189ES_linux/8189es.ko
